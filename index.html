<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BRENDA CONCURSADA</title>
  <style>
    :root {
      --navy: #0d1b2e;
      --royal: #2e6ff5;
      --sky: #4a9eed;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #facc15;
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #162033;
      --muted: #64748b;
      --line: #d8e0ec;
      --soft: #eaf1ff;
      --shadow: 0 12px 28px rgba(13, 27, 46, .07);
      --radius: 8px;
    }

    [data-theme="dark"] {
      --bg: #101827;
      --card: #162238;
      --text: #eef4ff;
      --muted: #aab7c9;
      --line: #2b3a55;
      --soft: #1d3155;
      --shadow: 0 16px 35px rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(74, 158, 237, .13), transparent 34%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 360px);
      color: var(--text);
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 7px;
      background: var(--royal);
      color: #fff;
      padding: 10px 14px;
      min-height: 40px;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    button:hover { transform: translateY(-1px); opacity: .95; }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .ghost { background: transparent; color: var(--royal); border: 1px solid var(--line); }
    .soft { background: var(--soft); color: var(--royal); }
    .green { background: var(--green); }
    .red { background: var(--red); }
    .yellow { background: var(--yellow); color: #1f2937; }
    .tiny { padding: 6px 9px; min-height: 30px; font-size: 12px; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 8px;
      padding: 10px 12px;
      outline: none;
    }

    textarea { min-height: 78px; resize: vertical; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background:
        linear-gradient(135deg, rgba(46, 111, 245, .34), transparent 42%),
        var(--navy);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      font-weight: 800;
      letter-spacing: .3px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #4a9eed, #22c55e);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.28), 0 10px 22px rgba(46,111,245,.25);
      font-weight: 900;
    }

    .top-center {
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .role-tabs, .top-actions, .timer-actions, .inline-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .role-tabs button {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
    }

    .role-tabs button.active {
      background: #fff;
      color: var(--navy);
    }

    .xp-row {
      display: grid;
      grid-template-columns: auto auto auto 1fr;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #d7e4ff;
    }

    .top-actions button {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--sky);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      border: 2px solid rgba(255,255,255,.55);
    }

    .timer {
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      padding: 8px;
    }

    .timer strong { font-variant-numeric: tabular-nums; min-width: 74px; text-align: center; }
    .timer select { width: 170px; background: #fff; color: #172033; padding: 7px 8px; }
    .timer button { min-height: 32px; padding: 6px 9px; }

    .shell {
      display: grid;
      grid-template-columns: 286px minmax(0, 1fr);
      min-height: calc(100vh - 85px);
    }

    .sidebar {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(14px);
      border-right: 1px solid var(--line);
      padding: 18px 14px;
      position: sticky;
      top: 86px;
      height: calc(100vh - 86px);
      overflow: auto;
    }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      color: var(--text);
      text-align: left;
      margin-bottom: 7px;
      border: 1px solid transparent;
      justify-content: flex-start;
      font-size: 15px;
    }

    .nav-btn.active {
      background: linear-gradient(90deg, rgba(46,111,245,.14), rgba(74,158,237,.08));
      color: var(--royal);
      border-color: var(--line);
      font-weight: 700;
    }

    main {
      padding: 28px;
      overflow: hidden;
    }

    .section { display: none; animation: appear .18s ease; }
    .section.active { display: block; }
    @keyframes appear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1, h2, h3 { margin: 0; line-height: 1.2; }
    h1 { font-size: clamp(24px, 3vw, 34px); }
    h2 { font-size: 22px; }
    h3 { font-size: 16px; }
    .muted { color: var(--muted); }
    .small { font-size: 13px; }

    .grid { display: grid; gap: 14px; }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .metric strong { display: block; font-size: 24px; margin-top: 6px; }
    .metric span { color: var(--muted); font-size: 13px; }

    .progress {
      height: 10px;
      background: rgba(100,116,139,.18);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > i {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--royal), var(--green));
      border-radius: inherit;
      transition: width .25s ease;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      background: var(--soft);
      color: var(--royal);
      white-space: nowrap;
    }

    .badge.green { background: rgba(34,197,94,.14); color: var(--green); }
    .badge.red { background: rgba(239,68,68,.14); color: var(--red); }
    .badge.yellow { background: rgba(250,204,21,.18); color: #9a6a00; }
    .badge.gray { background: rgba(100,116,139,.14); color: var(--muted); }

    .subject-row, .goal-row, .review-row, .calendar-day {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--card);
    }

    details {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: rgba(100,116,139,.04);
    }

    summary { cursor: pointer; font-weight: 700; }
    .topic-list { display: grid; gap: 8px; margin-top: 10px; }
    .checkline { display: flex; gap: 9px; align-items: flex-start; color: var(--text); }
    .checkline input { width: auto; margin-top: 3px; }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .calendar-tools {
      display: grid;
      grid-template-columns: 150px 1fr auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    .calendar-grid.month { grid-template-columns: repeat(auto-fit, minmax(245px, 1fr)); }
    .calendar-grid.week { grid-template-columns: repeat(auto-fit, minmax(245px, 1fr)); }
    .calendar-grid.list { grid-template-columns: 1fr; }

    .calendar-day {
      min-height: 218px;
      align-content: start;
      position: relative;
      overflow: hidden;
      border-color: rgba(46,111,245,.16);
    }
    .calendar-day.done { border-color: rgba(46,111,245,.6); background: rgba(46,111,245,.08); }
    .calendar-day.missed { border-color: rgba(239,68,68,.55); background: rgba(239,68,68,.07); }
    .calendar-day::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--royal), var(--green));
    }
    .calendar-date {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 850;
      font-size: 18px;
      padding-top: 4px;
    }
    .pill-stack { display: flex; gap: 7px; flex-wrap: wrap; align-items: flex-start; }
    .calendar-day .pill-stack {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      column-gap: 8px;
      row-gap: 7px;
    }
    .calendar-day textarea {
      min-height: 54px;
      max-height: 76px;
      font-size: 14px;
      background: rgba(255,255,255,.76);
    }

    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--card); }
    .table-wrap table { min-width: 900px; }

    .form-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .full { grid-column: 1 / -1; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 20, .58);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 60;
    }

    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: var(--card);
      color: var(--text);
      border-radius: 10px;
      box-shadow: 0 25px 60px rgba(0,0,0,.28);
      padding: 18px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 80;
      display: grid;
      gap: 10px;
      max-width: min(420px, calc(100vw - 36px));
    }

    .toast-item {
      background: var(--navy);
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      animation: appear .18s ease;
    }

    .help {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 55;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .chart {
      display: grid;
      gap: 10px;
    }

    .bar-line {
      display: grid;
      grid-template-columns: minmax(120px, 220px) 1fr 50px;
      gap: 10px;
      align-items: center;
    }

    .bar-line .progress { height: 16px; }
    .hidden-file { display: none; }

    @media (max-width: 1180px) {
      .topbar-inner { grid-template-columns: 1fr; }
      .top-actions { justify-content: flex-start; }
      .shell { grid-template-columns: 88px minmax(0, 1fr); }
      .sidebar { padding: 10px; }
      .nav-btn { justify-content: center; padding: 10px 6px; }
      .nav-btn span:last-child { display: none; }
      .grid.cols-4, .grid.cols-5 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .calendar-grid.month { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        display: flex;
        overflow-x: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav-btn { width: auto; min-width: 54px; }
      main { padding: 14px; }
      .grid.cols-2, .grid.cols-3, .grid.cols-4, .grid.cols-5, .form-grid, .form-grid.two, .filters, .calendar-tools {
        grid-template-columns: 1fr;
      }
      .calendar-grid.month, .calendar-grid.week { grid-template-columns: 1fr; }
      .page-head { display: grid; }
      .xp-row { grid-template-columns: 1fr 1fr; }
      .timer { display: grid; grid-template-columns: 1fr 1fr; }
      .timer select { width: 100%; grid-column: 1 / -1; }
      .brand { min-width: 0; }
      .bar-line { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="logo">C</div>
          <div>
            <div>BRENDA CONCURSADA</div>
            <div class="small" id="headerUser">Brenda</div>
          </div>
        </div>

        <div class="top-center">
          <div class="role-tabs">
            <button data-role="tecnico">Técnico TJDFT</button>
            <button data-role="analista">Analista TJDFT</button>
          </div>
          <div class="xp-row">
            <span id="levelText">Nível 1</span>
            <span id="xpText">0 XP</span>
            <span id="rankText">Bronze</span>
            <div class="progress"><i id="xpBar"></i></div>
          </div>
        </div>

        <div class="top-actions">
          <div class="timer">
            <strong id="timerText">00:00:00</strong>
            <select id="timerSubject"></select>
            <button class="tiny" id="timerStart" title="Iniciar">▶</button>
            <button class="tiny" id="timerPause" title="Pausar">Ⅱ</button>
            <button class="tiny" id="timerReset" title="Zerar">↺</button>
            <button class="tiny green" id="timerSave" title="Salvar sessão">✓</button>
          </div>
          <button id="achievementsBtn" title="Conquistas">★</button>
          <button id="themeBtn" title="Tema claro/escuro">◐</button>
          <button id="notifyBtn" title="Notificações">!</button>
          <div class="avatar" id="avatar">B</div>
        </div>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main>
        <section class="section active" id="dashboard"></section>
        <section class="section" id="daily"></section>
        <section class="section" id="calendar"></section>
        <section class="section" id="goals"></section>
        <section class="section" id="syllabus"></section>
        <section class="section" id="subjects"></section>
        <section class="section" id="questions"></section>
        <section class="section" id="reviews"></section>
        <section class="section" id="writing"></section>
        <section class="section" id="simulados"></section>
        <section class="section" id="performance"></section>
        <section class="section" id="materials"></section>
        <section class="section" id="methodology"></section>
        <section class="section" id="settings"></section>
      </main>
    </div>
  </div>

  <button class="help" id="helpBtn" title="Ajuda">?</button>
  <div class="toast" id="toast"></div>
  <div class="modal-backdrop" id="modal"><div class="modal" id="modalBody"></div></div>
  <input class="hidden-file" type="file" id="importFile" accept="application/json">

  <script>
    const STORAGE_KEY = "brenda-concursada-v2-iphone";
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const addDays = (iso, days) => {
      const d = new Date(iso + "T12:00:00");
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    };
    const fmtDate = iso => new Date(iso + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
    const uid = () => Math.random().toString(36).slice(2, 10);
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

    const topicBank = {

      "Direito do Consumidor": ["Princípios do CDC", "Direitos básicos", "Responsabilidade pelo fato e vício", "Práticas comerciais", "Proteção contratual", "Defesa do consumidor em juízo"],

    };

    const cargos = {
      tecnico: {
        label: "Técnico Judiciário - Área Administrativa",
        short: "Técnico TJDFT",
        writingTitle: "Redação",
        writingType: "Texto dissertativo-argumentativo",
        subjects: [
          ["Língua Portuguesa", "Conhecimentos Básicos"],
          ["Ética no Serviço Público", "Conhecimentos Básicos"],
          ["Regimento Interno do TJDFT", "Conhecimentos Básicos"],
          ["Lei de Organização Judiciária do DF e Territórios", "Conhecimentos Básicos"],
          ["Provimento Geral da Corregedoria", "Conhecimentos Específicos"],
          ["Provimento Judicial aplicado ao PJe", "Conhecimentos Específicos"],
          ["Noções de Direito Constitucional", "Conhecimentos Específicos"],
          ["Noções de Direito Administrativo", "Conhecimentos Específicos"],

    function buildDefaultState() {
      const state = {
        userName: "Brenda",
        activeRole: "tecnico",
        theme: "light",
        settings: {
          startDate: todayISO(),
          months: 6,
          availableDays: [1,2,3,4,5,6],
          hoursPerDay: 2,
          dailyQuestions: 25,
          weeklyWriting: 1
        },
        xp: 0,
        studiedDates: [],
        timerSessions: [],
        goals: {},
        calendar: {},
        reviews: {},
        questions: [],
        writings: [],
        simulados: [],
        materials: [],
        replanHistory: [],
        notifications: []
      };
      Object.keys(cargos).forEach(role => {
        state.goals[role] = [];
        state.calendar[role] = [];
        state.reviews[role] = [];
        cargos[role].subjects.forEach(([subject, type]) => {
          const topics = topicBank[subject] || ["Tópico editável 1", "Tópico editável 2", "Tópico editável 3"];
          topics.forEach((topic, index) => {
            state.goals[role].push({
              id: uid(), role, subject, type, topic,
              content: topic,
              order: state.goals[role].length + 1,
              status: "Não iniciado",
              notes: "",
              dueDate: null,
              completedAt: null,
              isReview: false,
              questionsPlanned: state.settings.dailyQuestions
            });
          });
        });
      });
      Object.keys(cargos).forEach(role => generateCalendar(state, role));
      return state;
    }

    let state = loadState();
    let activeSection = "dashboard";
    let timer = { seconds: 0, running: false, tick: null };

    function loadState() {
      const fresh = buildDefaultState();
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return fresh;
        const saved = JSON.parse(raw);
        if (!saved || !saved.goals || !saved.calendar) return fresh;

        const merged = { ...fresh, ...saved };
        merged.settings = { ...fresh.settings, ...(saved.settings || {}) };

        if (!cargos[merged.activeRole]) merged.activeRole = "tecnico";
        if (!["light", "dark"].includes(merged.theme)) merged.theme = "light";

        ["tecnico", "analista"].forEach(role => {
          if (!Array.isArray(merged.goals?.[role])) merged.goals[role] = fresh.goals[role];
          if (!Array.isArray(merged.calendar?.[role])) merged.calendar[role] = fresh.calendar[role];
          if (!Array.isArray(merged.reviews?.[role])) merged.reviews[role] = [];
        });

        ["studiedDates", "timerSessions", "questions", "writings", "simulados", "materials", "replanHistory", "notifications"].forEach(key => {
          if (!Array.isArray(merged[key])) merged[key] = [];
        });

        if (!merged.goals || typeof merged.goals !== "object") merged.goals = fresh.goals;
        if (!merged.calendar || typeof merged.calendar !== "object") merged.calendar = fresh.calendar;
        if (!merged.reviews || typeof merged.reviews !== "object") merged.reviews = fresh.reviews;

        return merged;
      } catch (e) {
        console.warn("Não foi possível carregar os dados salvos. O plano padrão foi restaurado.", e);
        return fresh;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function roleGoals(role = state.activeRole) {
      return state.goals[role] || [];
    }

    function roleCalendar(role = state.activeRole) {
      return state.calendar[role] || [];
    }

    function roleReviews(role = state.activeRole) {
      return state.reviews[role] || [];
    }

    function percent(done, total) {
      return total ? Math.round((done / total) * 100) : 0;
    }

    function getStats(role = state.activeRole) {
      const goals = roleGoals(role);
      const done = goals.filter(g => g.status === "Estudado" || g.status === "Dominado").length;
      const late = goals.filter(g => g.dueDate && g.dueDate < todayISO() && !["Estudado", "Dominado"].includes(g.status)).length;
      const pending = goals.length - done;
      const qTotal = state.questions.filter(q => q.role === role).reduce((s, q) => s + Number(q.qty || 0), 0);
      const qHits = state.questions.filter(q => q.role === role).reduce((s, q) => s + Number(q.hits || 0), 0);
      const hours = state.timerSessions.filter(s => s.role === role).reduce((s, t) => s + t.seconds, 0) / 3600;
      const reviewsToday = roleReviews(role).filter(r => r.date <= todayISO() && r.status !== "Concluída");
      const nextReview = roleReviews(role).filter(r => r.date >= todayISO() && r.status !== "Concluída").sort((a,b) => a.date.localeCompare(b.date))[0];
      const nextCalendar = roleCalendar(role).filter(d => d.date >= todayISO() && d.status !== "Concluído").sort((a,b) => a.date.localeCompare(b.date))[0];
      const subjectProgress = cargos[role].subjects.map(([subject, type]) => {
        const arr = goals.filter(g => g.subject === subject);
        const d = arr.filter(g => ["Estudado", "Dominado"].includes(g.status)).length;
        return { subject, type, total: arr.length, done: d, pct: percent(d, arr.length) };
      });
      const mostLate = subjectProgress
        .map(s => ({...s, late: goals.filter(g => g.subject === s.subject && g.dueDate && g.dueDate < todayISO() && !["Estudado", "Dominado"].includes(g.status)).length}))
        .sort((a,b) => b.late - a.late)[0];
      return {
        done, pending, late, total: goals.length, progress: percent(done, goals.length),
        qTotal, qHits, accuracy: percent(qHits, qTotal),
        hours, reviewsToday, nextReview, nextCalendar, subjectProgress, mostLate,
        streak: currentStreak()
      };
    }

    function currentStreak() {
      const dates = [...new Set(state.studiedDates)].sort().reverse();
      if (!dates.length) return 0;
      let streak = 0;
      let cursor = todayISO();
      if (!dates.includes(cursor)) cursor = addDays(cursor, -1);
      while (dates.includes(cursor)) {
        streak++;
        cursor = addDays(cursor, -1);
      }
      return streak;
    }

    function rankFromXP(xp) {
      if (xp >= 10000) return "Concurseira Suprema";
      if (xp >= 5000) return "Diamante";
      if (xp >= 2500) return "Ouro";
      if (xp >= 1000) return "Prata";
      return "Bronze";
    }

    function levelFromXP(xp) {
      return Math.max(1, Math.floor(xp / 100) + 1);
    }

    function addXP(amount, reason) {
      state.xp = Number(state.xp || 0) + amount;
      state.notifications.unshift({ id: uid(), date: new Date().toISOString(), text: `+${amount} XP: ${reason}` });
      toast(`+${amount} XP: ${reason}`);
      checkAchievements();
      saveState();
    }

    function checkAchievements() {
      const stats = getStats();
      const level = levelFromXP(state.xp);
      const achievements = [
        [stats.streak >= 3, "Primeiro Passo"],
        [stats.streak >= 7, "Semana Perfeita"],
        [stats.streak >= 14, "Duas Semanas Firme"],
        [stats.streak >= 30, "Mês de Fogo"],
        [stats.streak >= 60, "Inabalável"],
        [stats.streak >= 100, "Centenário"],
        [stats.qHits >= 25, "Acertador"],
        [stats.qHits >= 100, "Precisão Cirúrgica"],
        [stats.qHits >= 250, "Sniper do Conhecimento"],
        [stats.qHits >= 500, "Perfeição Absoluta"],
        [level >= 5, "Primeiro Degrau"],
        [level >= 10, "Dedicação Constante"],
        [level >= 25, "Mente Afiada"],
        [level >= 50, "Mestre do Conhecimento"],
        [level >= 100, "Lenda dos Estudos"]
      ];
      state.achievements = state.achievements || [];
      achievements.forEach(([ok, name]) => {
        if (ok && !state.achievements.includes(name)) {
          state.achievements.push(name);
          state.notifications.unshift({ id: uid(), date: new Date().toISOString(), text: `Conquista desbloqueada: ${name}` });
        }
      });
    }

    function generateCalendar(targetState = state, role = state.activeRole) {
      const cfg = targetState.settings;
      const start = cfg.startDate || todayISO();
      const days = Math.max(30, Number(cfg.months || 6) * 30);
      const available = cfg.availableDays || [1,2,3,4,5,6];
      const goals = targetState.goals[role].filter(g => !g.isReview);
      const specific = goals.filter(g => g.type === "Conhecimentos Específicos");
      const basic = goals.filter(g => g.type !== "Conhecimentos Específicos");
      const queue = [];
      let si = 0, bi = 0;
      while (si < specific.length || bi < basic.length) {
        if (specific[si]) queue.push(specific[si++]);
        if (specific[si]) queue.push(specific[si++]);
        if (basic[bi]) queue.push(basic[bi++]);
      }
      const cal = [];
      let qi = 0;
      for (let i = 0; i < days; i++) {
        const date = addDays(start, i);
        const dow = new Date(date + "T12:00:00").getDay();
        if (!available.includes(dow)) continue;
        const items = [];
        const perDay = Math.max(1, Math.floor(Number(cfg.hoursPerDay || 2)));
        for (let n = 0; n < perDay && qi < queue.length; n++) {
          const goal = queue[qi++];
          goal.dueDate = date;
          items.push(goal.id);
        }
        if (i % 7 === 5) items.push("QUESTOES");
        if (i % 14 === 12) items.push("SIMULADO");
        if (i % 7 === 3) items.push("WRITING");
        cal.push({ id: uid(), date, role, items, status: "Pendente", notes: "" });
      }
      targetState.calendar[role] = cal;
    }

        const g = roleGoals(day.role).find(x => x.id === id);
        if (g) return `<span class="badge">${escapeHtml(g.subject)}</span><span class="small">${escapeHtml(g.topic)}</span>`;
        if (id === "QUESTOES") return `<span class="badge yellow">Questões</span>`;
        if (id === "SIMULADO") return `<span class="badge red">Simulado</span>`;
        if (id === "WRITING") return `<span class="badge green">${cargos[day.role].writingTitle}</span>`;
        return "";
      }).join("");
      return `<div class="calendar-day ${day.status === "Concluído" ? "done" : day.status === "Não estudado" ? "missed" : ""}">
        <div class="calendar-date"><span>${fmtDate(day.date)}</span><span class="badge gray">${day.status}</span></div>
        <div class="pill-stack">${labels || "<span class='muted'>Dia livre</span>"}</div>
        <textarea data-day-note="${day.id}" placeholder="Editar plano do dia">${escapeHtml(day.notes || "")}</textarea>
        <div class="inline-actions">
          <button class="tiny green" data-day-done="${day.id}">Concluir</button>
          <button class="tiny ghost" data-day-missed="${day.id}">Não estudei</button>
        </div>
      </div>`;
    }

    function bindCalendarDayActions() {
      document.querySelectorAll("[data-day-done]").forEach(btn => btn.onclick = () => completeDay(btn.dataset.dayDone));
      document.querySelectorAll("[data-day-missed]").forEach(btn => btn.onclick = () => missDay(btn.dataset.dayMissed));
      document.querySelectorAll("[data-day-note]").forEach(el => el.onchange = () => {
        const day = roleCalendar().find(d => d.id === el.dataset.dayNote);
        if (day) day.notes = el.value;
        saveState();
      });
    }

    function completeDay(dayId) {
      const day = roleCalendar().find(d => d.id === dayId);
      if (!day) return;
      day.status = "Concluído";
      day.items.forEach(id => {
        const goal = roleGoals().find(g => g.id === id);
        if (goal && !["Estudado","Dominado"].includes(goal.status)) markGoalComplete(goal);
      });
      markStudiedDate(day.date);
      addXP(20, "dia concluído");
      renderAll();
    }

    function missDay(dayId) {
      const day = roleCalendar().find(d => d.id === dayId);
      if (!day) return;
      day.status = "Não estudado";
      day.items.forEach(id => {
        const goal = roleGoals().find(g => g.id === id && !["Estudado","Dominado"].includes(g.status));
        if (goal) goal.status = "Atrasada";
      });
      saveState();
      renderAll();
      openModal(`
        <h2>Tudo bem.</h2>
        <p>Concurso é constância, não perfeição. Vou reorganizar sua meta para você continuar do próximo passo.</p>
        <div class="inline-actions"><button data-replan>Replanejar agora</button><button class="ghost" data-close-modal>Fechar</button></div>
      `);
      bindCommon();
    }

    function renderPerformance() {
      const stats = getStats();
      const qBySubject = cargos[state.activeRole].subjects.map(([subject]) => {
        const rows = state.questions.filter(q => q.role === state.activeRole && q.subject === subject);
        const qty = rows.reduce((s,q) => s + Number(q.qty || 0), 0);
        const hits = rows.reduce((s,q) => s + Number(q.hits || 0), 0);
        return { subject, pct: percent(hits, qty), qty };
      });
      document.getElementById("performance").innerHTML = `
        ${pageHead("Desempenho", "Indicadores gerais, por matéria e evolução.")}
        <div class="grid cols-4">
          ${metric("Progresso geral", stats.progress + "%")}

        </div>
        <div class="grid cols-2" style="margin-top:14px">
          <div class="card"><h2>Progresso por matéria</h2><div class="chart" style="margin-top:12px">${stats.subjectProgress.map(s => barLine(s.subject, s.pct)).join("")}</div></div>

    function weeklyBars() {
      const weeks = [0,1,2,3].map(i => {
        const end = addDays(todayISO(), -i*7);
        const start = addDays(end, -6);
        const sessions = state.timerSessions.filter(s => s.date >= start && s.date <= end && s.role === state.activeRole);
        const hours = sessions.reduce((sum, s) => sum + s.seconds, 0) / 3600;
        return { label: `Semana ${4 - i}`, pct: clamp(Math.round((hours / 14) * 100), 0, 100), hours };
      }).reverse();
      return weeks.map(w => barLine(`${w.label} (${w.hours.toFixed(1)}h)`, w.pct)).join("");
    }

    function bindGoalChecks() {

        if (el.checked) completeGoal(el.dataset.goalCheck);
        else {
          const g = roleGoals().find(x => x.id === el.dataset.goalCheck);
          if (g) g.status = "Não iniciado";

          renderAll();
        }

    function bindStatusAndNotes() {
      document.querySelectorAll("[data-status]").forEach(el => el.onchange = () => {
        const g = roleGoals().find(x => x.id === el.dataset.status);
        if (g) {
          if (["Estudado","Dominado"].includes(el.value) && !g.completedAt) markGoalComplete(g);
          else g.status = el.value;
          saveState();
        }
      });
      document.querySelectorAll("[data-goal-note]").forEach(el => el.onchange = () => {
        const g = roleGoals().find(x => x.id === el.dataset.goalNote);
        if (g) g.notes = el.value;
        saveState();
      });
    }

    function completeGoal(id) {
      const goal = roleGoals().find(g => g.id === id);
      if (!goal) return;
      markGoalComplete(goal);
      addXP(20, "meta concluída");
      renderAll();
    }

    function markGoalComplete(goal) {
      goal.status = "Estudado";
      goal.completedAt = todayISO();
      markStudiedDate(todayISO());
      generateReviews(goal);
    }

    function generateReviews(goal) {
      const existing = roleReviews(goal.role).filter(r => r.goalId === goal.id);
      if (existing.length) return;
      [1,7,15,30].forEach(days => {
        state.reviews[goal.role].push({
          id: uid(), goalId: goal.id, role: goal.role,
          subject: goal.subject, topic: goal.topic,
          date: addDays(todayISO(), days),
          status: "Revisão futura"
        });
      });
    }

    function markStudiedDate(date) {
      if (!state.studiedDates.includes(date)) state.studiedDates.push(date);
    }

    function openReplanModal() {
      const goals = roleGoals().filter(g => !["Estudado","Dominado"].includes(g.status) && (g.status === "Atrasada" || (g.dueDate && g.dueDate < todayISO())));
      const reviews = roleReviews().filter(r => r.date < todayISO() && r.status !== "Concluída");
      const qPending = Math.max(0, goals.length * state.settings.dailyQuestions);
      const writings = roleCalendar().filter(d => d.date < todayISO() && d.items.includes("WRITING") && d.status !== "Concluído").length;
      const sims = roleCalendar().filter(d => d.date < todayISO() && d.items.includes("SIMULADO") && d.status !== "Concluído").length;
      const newDeadline = addDays(todayISO(), Math.ceil((goals.length + reviews.length) / Math.max(1, state.settings.hoursPerDay)) + 7);
      openModal(`
        <h2>Replanejar atrasos</h2>
        <p class="muted">O plano será reorganizado sem apagar o que já foi concluído.</p>
        <div class="grid cols-3">
          ${metric("Metas atrasadas", goals.length)}
          ${metric("Revisões atrasadas", reviews.length)}
          ${metric("Questões pendentes", qPending)}
          ${metric("Discursivas pendentes", writings)}
          ${metric("Simulados pendentes", sims)}
          ${metric("Novo prazo estimado", fmtDate(newDeadline))}
        </div>
        <div class="card" style="margin-top:14px">
          <h3>Impacto no planejamento</h3>
          <p>As pendências serão redistribuídas nos próximos dias disponíveis, priorizando conhecimentos específicos, mantendo revisões, simulados e ${cargos[state.activeRole].writingTitle.toLowerCase()}.</p>
          ${goals.length > 20 ? `<p class="badge yellow">Sugestão: aumentar prazo, reduzir metas por dia ou quebrar metas grandes.</p>` : ""}
        </div>
        <div class="inline-actions" style="margin-top:14px">
          <button id="confirmReplan">Confirmar replanejamento</button>
          <button class="ghost" data-close-modal>Cancelar</button>
        </div>
      `);
      bindCommon();
      document.getElementById("confirmReplan").onclick = () => applyReplan(goals, reviews, newDeadline);
    }

    function applyReplan(goals, reviews, newDeadline) {
      const available = state.settings.availableDays;
      let cursor = todayISO();
      const ordered = goals.sort((a,b) => (a.type === "Conhecimentos Específicos" ? -1 : 1));
      ordered.forEach(goal => {
        cursor = nextAvailableDate(cursor, available);
        goal.dueDate = cursor;
        goal.status = "Não iniciado";
        let day = roleCalendar().find(d => d.date === cursor);
        if (!day) {
          day = { id: uid(), date: cursor, role: state.activeRole, items: [], status: "Pendente", notes: "" };
          state.calendar[state.activeRole].push(day);
        }
        if (!day.items.includes(goal.id)) day.items.push(goal.id);
        cursor = addDays(cursor, 1);
      });
      reviews.forEach(r => {
        cursor = nextAvailableDate(cursor, available);
        r.date = cursor;
        r.status = "Revisão futura";
        cursor = addDays(cursor, 1);
      });
      state.replanHistory.unshift({ date: todayISO(), goals: goals.length, reviews: reviews.length, reason: "Atrasos redistribuídos", deadline: fmtDate(newDeadline), notes: "Replanejamento automático preservando progresso." });
      saveState();
      closeModal();
      renderAll();
      toast("Tudo certo. Reorganizei seu plano sem apagar o que você já fez. Agora é só continuar do próximo passo.");
    }

    function nextAvailableDate(date, available) {
      let d = date;
      while (!available.includes(new Date(d + "T12:00:00").getDay())) d = addDays(d, 1);
      return d;
    }

    function showTodayPlan() {
      const day = roleCalendar().find(d => d.date >= todayISO());
      if (!day) return toast("Nenhuma meta futura encontrada.");
      openModal(`<h2>O que estudar hoje?</h2>${dayCard(day)}<div class="inline-actions" style="margin-top:12px"><button class="ghost" data-close-modal>Fechar</button></div>`);
      bindCalendarDayActions();
      bindCommon();
    }

    function addGoalModal() {
      const subjects = cargos[state.activeRole].subjects.map(([s]) => s);
      openModal(`
        <h2>Adicionar nova meta</h2>
        <div class="form-grid two">
          <label>Matéria<select id="newGoalSubject">${subjects.map(s => `<option>${escapeHtml(s)}</option>`).join("")}</select></label>
          <label>Tipo<select id="newGoalType"><option>Conhecimentos Básicos</option><option>Conhecimentos Específicos</option><option>Discursiva</option></select></label>
          <label class="full">Conteúdo<input id="newGoalContent"></label>
        </div>
        <div class="inline-actions" style="margin-top:12px"><button id="saveNewGoal">Adicionar</button><button class="ghost" data-close-modal>Cancelar</button></div>
      `);
      bindCommon();
      document.getElementById("saveNewGoal").onclick = () => {
        state.goals[state.activeRole].push({ id: uid(), role: state.activeRole, subject: newGoalSubject.value, type: newGoalType.value, topic: newGoalContent.value, content: newGoalContent.value, order: roleGoals().length + 1, status: "Não iniciado", notes: "", dueDate: null, completedAt: null });
        closeModal();
        renderAll();
      };
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "brenda-concursada-dados.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById("importFile").onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!imported.goals || !imported.calendar) throw new Error("Arquivo inválido");
          state = imported;
          saveState();
          renderAll();
          toast("Dados importados com sucesso.");
        } catch (err) {
          toast("Não foi possível importar esse arquivo.");
        }
      };
      reader.readAsText(file);
    };

    function openModal(html) {
      document.getElementById("modalBody").innerHTML = html;
      document.getElementById("modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
    }

    function toast(text) {
      const box = document.getElementById("toast");
      const item = document.createElement("div");
      item.className = "toast-item";
      item.textContent = text;
      box.appendChild(item);
      setTimeout(() => item.remove(), 4200);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[s]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    document.addEventListener("click", e => {
      if (e.target.closest("[data-close-modal]")) {
        closeModal();
      }
      const nav = e.target.closest("[data-section]");
      if (nav) {
        activeSection = nav.dataset.section;
        renderAll();
      }
      if (e.target.id === "confirmReset") {
        localStorage.removeItem(STORAGE_KEY);
        state = buildDefaultState();
        closeModal();
        renderAll();
      }
    });

    document.getElementById("modal").addEventListener("click", e => {
      if (e.target.id === "modal") closeModal();
    });

    document.querySelectorAll("[data-role]").forEach(btn => btn.onclick = () => {
      state.activeRole = btn.dataset.role;
      renderAll();
    });

    document.getElementById("themeBtn").onclick = () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      renderAll();
    };

    document.getElementById("notifyBtn").onclick = () => {
      openModal(`<h2>Notificações</h2><div class="grid">${(state.notifications || []).slice(0,20).map(n => `<div class="goal-row"><strong>${escapeHtml(n.text)}</strong><span class="muted">${new Date(n.date).toLocaleString("pt-BR")}</span></div>`).join("") || "Sem notificações."}</div><div class="inline-actions" style="margin-top:12px"><button class="ghost" data-close-modal>Fechar</button></div>`);
      bindCommon();
    };

    document.getElementById("achievementsBtn").onclick = () => {
      checkAchievements();
      const all = ["Primeiro Passo","Semana Perfeita","Duas Semanas Firme","Mês de Fogo","Inabalável","Centenário","Acertador","Precisão Cirúrgica","Sniper do Conhecimento","Perfeição Absoluta","Primeiro Degrau","Dedicação Constante","Mente Afiada","Mestre do Conhecimento","Lenda dos Estudos"];
      openModal(`<h2>Conquistas</h2><div class="grid cols-3">${all.map(a => `<div class="card"><h3>${escapeHtml(a)}</h3><p>${(state.achievements || []).includes(a) ? "Desbloqueada" : "Bloqueada"}</p></div>`).join("")}</div><div class="inline-actions" style="margin-top:12px"><button class="ghost" data-close-modal>Fechar</button></div>`);
      bindCommon();
    };

    document.getElementById("helpBtn").onclick = () => {
      openModal(`<h2>Ajuda rápida</h2><p>Use o menu lateral para navegar. Tudo fica salvo automaticamente neste navegador. Para enviar seus dados para outro computador, use Exportar JSON e depois Importar JSON.</p><p>Se atrasar, use Replanejar Atrasos. O sistema preserva o progresso e redistribui o que ficou pendente.</p><div class="inline-actions"><button class="ghost" data-close-modal>Fechar</button></div>`);
      bindCommon();
    };

    function updateTimerText() {
      const h = String(Math.floor(timer.seconds / 3600)).padStart(2, "0");
      const m = String(Math.floor((timer.seconds % 3600) / 60)).padStart(2, "0");
      const s = String(timer.seconds % 60).padStart(2, "0");
      document.getElementById("timerText").textContent = `${h}:${m}:${s}`;
    }

    document.getElementById("timerStart").onclick = () => {
      if (timer.running) return;
      timer.running = true;
      timer.tick = setInterval(() => { timer.seconds++; updateTimerText(); }, 1000);
    };

    document.getElementById("timerPause").onclick = () => {
      timer.running = false;
      clearInterval(timer.tick);
    };

    document.getElementById("timerReset").onclick = () => {
      timer.running = false;
      clearInterval(timer.tick);
      timer.seconds = 0;
      updateTimerText();
    };

    document.getElementById("timerSave").onclick = () => {
      if (timer.seconds < 60) return toast("Estude pelo menos 1 minuto antes de salvar a sessão.");
      const subject = document.getElementById("timerSubject").value;
      state.timerSessions.push({ id: uid(), role: state.activeRole, subject, seconds: timer.seconds, date: todayISO() });
      markStudiedDate(todayISO());
      addXP(Math.max(10, Math.floor(timer.seconds / 1800) * 10), "sessão com cronômetro");
      timer.seconds = 0;
      timer.running = false;
      clearInterval(timer.tick);
      updateTimerText();
      renderAll();
    };

    renderAll();
  </script>
</body>
</html>
